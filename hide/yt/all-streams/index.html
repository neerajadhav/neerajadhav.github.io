<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Meta tags -->
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" name="viewport" />
    <meta name="viewport" content="width=device-width" />
    <meta name="theme-color" content="#111417">

    <!-- Favicon and title 
    <link rel="icon" href="https://www.youtube.com/s/desktop/d9bba4ed/img/favicon.ico">
    -->
    <title>All Streams</title>

    <!-- Halfmoon CSS -->
  <link href="https://cdn.jsdelivr.net/npm/halfmoon@1.1.1/css/halfmoon-variables.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  </head>

  <body class="with-custom-webkit-scrollbars with-custom-css-scrollbars" data-dm-shortcut-enabled="true" data-sidebar-shortcut-enabled="true" data-set-preferred-theme-onload="true" onload="loadXMLDoc()">

    <!-- Page wrapper start -->
    <div class="page-wrapper with-navbar with-sidebar" data-sidebar-type="overlayed-sm-and-down">
      <div class="sidebar-overlay" onclick="halfmoon.toggleSidebar()"></div>
      
      <!-- Navbar (immediate child of the page wrapper) -->
    <nav class="navbar">
      <!-- Navbar content (with toggle sidebar button) -->
      <div class="navbar-content">
        <button onclick="halfmoon.toggleSidebar()" class="btn btn-action" type="button">
          <i class="fa fa-bars" aria-hidden="true"></i>
          <span class="sr-only">Toggle sidebar</span> <!-- sr-only = show only on screen readers -->
        </button>
      </div>
      <!-- Navbar brand -->
      <a href="./" class="navbar-brand">
        All Streams
      </a>
      <!-- Navbar nav -->
      <ul class="navbar-nav d-none d-md-flex"> <!-- d-none = display: none, d-md-flex = display: flex on medium screens and up (width > 768px) -->
        <li class="nav-item">
          <a onclick="halfmoon.toggleDarkMode()" class="nav-link"><i class="fa fa-moon-o"></i>&nbsp;Dark</a>
        </li>
        <li class="nav-item">
          <a class="nav-link"><i class="fa fa-user-o"></i>&nbsp;Profile</a>
        </li>
      </ul>
      <!-- Navbar form (inline form) -->
      <form class="form-inline d-none d-md-flex ml-auto" action="..." method="..."> <!-- d-none = display: none, d-md-flex = display: flex on medium screens and up (width > 768px), ml-auto = margin-left: auto -->
        <input type="text" class="form-control" placeholder="Search Zestara" required="required">
        <button class="btn btn-primary" type="submit"><i class="fa fa-search"></i></button>
      </form>
      <!-- Navbar content (with the dropdown menu) -->
      <div class="navbar-content d-md-none ml-auto"> <!-- d-md-none = display: none on medium screens and up (width > 768px), ml-auto = margin-left: auto -->
        <div class="dropdown with-arrow">
          <button class="btn" data-toggle="dropdown" type="button" id="navbar-dropdown-toggle-btn-1">
            <i class="fa fa-angle-down" aria-hidden="true"></i>
          </button>
          <div class="dropdown-menu dropdown-menu-right w-200" aria-labelledby="navbar-dropdown-toggle-btn-1"> <!-- w-200 = width: 20rem (200px) -->
            <a onclick="halfmoon.toggleDarkMode()" class="dropdown-item"><i class="fa fa-moon-o"></i> Dark</a>
            <a class="dropdown-item"><i class="fa fa-user-o"></i> Profile</a>
            <div class="dropdown-divider"></div>
            <div class="dropdown-content">
              <form action="..." method="...">
                <div class="form-group">
                  <input type="text" class="form-control" placeholder="Search Zestara" required="required">
                </div>
                <button class="btn btn-primary btn-block" type="submit"><i class="fa fa-search"></i></button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </nav>

      <!-- Sidebar start -->
      <div class="sidebar">
        <div class="sidebar-menu">
          <a href="../" class="sidebar-link sidebar-link-with-icon">
            <span class="sidebar-icon bg-transparent justify-content-start mr-0">
              <i class="fa fa-dashboard"></i>
            </span>
            Dashboard
          </a>
          <a href="../live" class="sidebar-link sidebar-link-with-icon">
            <span class="sidebar-icon bg-transparent justify-content-start mr-0">
              <i class="fa fa-video-camera"></i>
            </span>
            Live
          </a>
          <a href="../monetization" class="sidebar-link sidebar-link-with-icon">
            <span class="sidebar-icon bg-transparent justify-content-start mr-0">
              <i class="fa fa-credit-card"></i>
            </span>
            Monetization
          </a>
          <a href="../all-streams" class="active sidebar-link sidebar-link-with-icon">
            <span class="sidebar-icon bg-transparent justify-content-start mr-0">
              <i class="fa fa-folder"></i>
            </span>
            All Streams
          </a>
        </div>
      </div>
      <!-- Sidebar end -->

      <!-- Content wrapper start -->
      <div class="content-wrapper">
        <div class="w-full h-full">
          <div class="content">
            All Streams
          </div>
        </div>
      </div>
      <!-- Content wrapper end -->
    </div>
    <!-- Page wrapper end -->

    <!-- Halfmoon JS -->
  <script src="https://cdn.jsdelivr.net/npm/halfmoon@1.1.1/js/halfmoon.min.js"></script>
  </body>
</html>
